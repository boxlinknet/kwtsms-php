name: Auto-merge Dependabot

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge GitHub Actions patch updates only.
      # Composer updates (dev deps) require manual review: a bad phpunit/phpstan
      # minor could silently break the test suite without failing CI in an obvious way.
      - name: Auto-approve GitHub Actions patch updates
        if: >
          steps.metadata.outputs.package-ecosystem == 'github_actions' &&
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr review "$PR_URL" --approve
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge GitHub Actions patch updates
        if: >
          steps.metadata.outputs.package-ecosystem == 'github_actions' &&
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
